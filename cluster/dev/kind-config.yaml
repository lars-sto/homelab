kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: homelab-dev

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8090
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
  - role: worker