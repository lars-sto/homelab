apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/lars-sto/homelab.git
    targetRevision: main
    path: gitops/manifests/apps/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
