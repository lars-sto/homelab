apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-argocd-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/lars-sto/homelab.git
    targetRevision: main
    path: gitops/manifests/platform/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true